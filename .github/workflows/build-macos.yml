name: Build macOS App

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: macOS ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            arch: arm64
          - runner: macos-15-intel
            arch: x64
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest

      - name: Run macOS dependency smoke check
        run: python scripts/macos_smoke_check.py

      - name: Build app bundle
        run: python -m PyInstaller build/macos/MacAutoTyper.spec --clean --noconfirm

      - name: Verify app bundle
        run: python scripts/macos_smoke_check.py --app-bundle dist/MacAutoTyper.app

      - name: Build unsigned DMG
        run: |
          mkdir -p dist_dmg
          hdiutil create \
            -volname "MacAutoTyper" \
            -srcfolder "dist/MacAutoTyper.app" \
            -ov \
            -format UDZO \
            "dist_dmg/MacAutoTyper-${{ matrix.arch }}.dmg"

      - name: Archive app bundle with permissions
        run: |
          mkdir -p dist_archive
          tar -czf "dist_archive/MacAutoTyper-${{ matrix.arch }}.app.tar.gz" -C dist "MacAutoTyper.app"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: MacAutoTyper-${{ matrix.arch }}-dmg
          path: |
            dist_dmg/MacAutoTyper-${{ matrix.arch }}.dmg

      - name: Upload app tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: MacAutoTyper-${{ matrix.arch }}-app-tarball
          path: |
            dist_archive/MacAutoTyper-${{ matrix.arch }}.app.tar.gz
